{% extends "base.html" %}

{% block title %}Register - PriceFlow{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full space-y-8">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
        Create your account
      </h2>
      <p class="mt-2 text-center text-sm text-gray-400">
        Already have an account? <a href="{{ url_for('auth.login') }}" class="font-medium text-primary hover:text-primary-light">
          Sign in
        </a>
      </p>
    </div>
    
    <form class="mt-8 space-y-6" method="POST">
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-300">Username</label>
          <input id="username" name="username" type="text" required
                 class="mt-1 block w-full px-3 py-2 border border-gray-600 bg-gray-800 text-white rounded-md focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
        </div>
        
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300">Email</label>
          <input id="email" name="email" type="email"
                 class="mt-1 block w-full px-3 py-2 border border-gray-600 bg-gray-800 text-white rounded-md focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
        </div>
        
        <div>
          <label for="full_name" class="block text-sm font-medium text-gray-300">Full Name</label>
          <input id="full_name" name="full_name" type="text"
                 class="mt-1 block w-full px-3 py-2 border border-gray-600 bg-gray-800 text-white rounded-md focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
        </div>
        
        <div>
          <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
          <input id="password" name="password" type="password" required
                 class="mt-1 block w-full px-3 py-2 border border-gray-600 bg-gray-800 text-white rounded-md focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
        </div>
      </div>

      <div>
        <button type="submit"
                class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
          Register
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
